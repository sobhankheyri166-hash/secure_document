{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/bootstrap/bootstrap.min.css' %}">
    <title>{{ customer_obj.username }}</title>

    <style>
      @media(max-width:576px){
        .buttons a,button{
            width: 100%;
        }  
      }
      nav{
        height: 50px !important;
      }
      form{
        input,label{
            display: block;
        }
        input{
            margin-bottom: 1rem;
        }
        .helptext{
          color: #6c757d;
          font: 0.85rem;
        }
        div:has(> input[type="checkbox"]){
            label{
                display: block !important;
            }
            input, .helptext{
              display: inline !important;
            }
        }
      }
    </style>
</head>
<body>
  <nav class="container-fluid bg-info mb-3 mb-lg-0"></nav>
  <main class="d-flex vh-100">
    <section class="m-auto w-75">
      <h2>User Profile Edit</h2>
      <form action="" method="post" class="form-control shadow">
        {% csrf_token %}
      <div class="mb-2">{{ form }}</div>
      <a href="{% url 'admin_password_reset' customer_obj.username %}" class="d-block mb-3">Reset Password</a>
      <div class="d-flex gap-4 buttons">
          <button type="submit" class="btn btn-outline-success">Save Changes</button>
          <a href="{% url 'users_view' %}" class="btn btn-outline-danger">Cancel</a>
      </div>
      
      </form>    
    </section>

    
  </main>
</body>
</html>
