{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/bootstrap/bootstrap.min.css' %}">
    <title>Document</title>
    <style>
      .users-row{
        border: 1px solid black;
        margin-top: 1.3rem;
        border-radius: 5px;
        padding: 1rem;
        color: black;
      }
      .check-icon{
        width: 30px;
        height: 20px;
      }
      .edit-btn{
        transition: background-color 0.3s ease-in-out;
      }
      .edit-btn:hover{
        background-color: gray;
      }
      .edit-btn div{
        width: 25px;
        height: 23px;
        transition: color 0.3s ease-in-out;
      }
      .edit-btn div:hover{
        color: white;
      }
    </style>
    
</head>
<body>
  {% for message in messages %}
  <section class="bg-success">
    <div class="d-flex flex-row text-white">
      <div class="check-icon">{% include 'portal/icons/check.html' %}</div>
      <h3>{{ message }}</h3>
    </div>
  </section>
  {% endfor %}  
  <div class="d-flex flex-column gap-3">
    <div>
      
    </div>
    <header class="d-flex row justify-content-between mt-3 w-75 m-auto border-bottom">
      <span class="col-3 d-flex justify-content-center align-items-center">Name</span>
      <span class="col-3 d-flex justify-content-center align-items-center">Username</span>
      <div class="col-3 mb-1 d-flex justify-content-center align-items-center">
        <a  href="" class="btn btn-outline-primary">Add Customer</a>
      </div>
    </header>
    {% for user in users_info %}
    <div class="row justify-content-between w-75 m-auto users-row overflow-scroll">
      <span class="col-3 text-center align-content-center">{{ user }}</span>
      <span class="col-3 text-center align-content-center">{{ user.username }}</span>
      <div class="col-3 d-flex justify-content-center align-items-center">
        <a href="{% url 'users_profile' user.username %}" class="btn edit-btn">
          <div>{% include 'portal/icons/pencil.html' %}</div>
        </a>
        <a href="" class="btn btn-outline-danger">Remove</a>
      </div>
    </div>
    {% endfor %}         
 
  </div>

</body>
</html>
